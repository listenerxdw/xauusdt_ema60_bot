name: Scheduled Check

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  trigger-check:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger XAUUSDT check
        run: |
          curl --fail --show-error --silent \
            -X POST "https://xauusdt-ema60-bot-lively-sound-5958.fly.dev/check" \
            -H "Content-Type: application/json" \